<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحوكمة الكامل - مبرة دار الخير</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0a5e6f;
            --secondary: #0e7e8f;
            --success: #15803d;
            --warning: #d97706;
            --danger: #991b1b;
            --bg-light: #f1f5f9;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.2s ease; }
        body { background-color: var(--bg-light); margin: 0; padding: 0; min-height: 100vh; }

        #loginOverlay {
            position: fixed; inset: 0; background: var(--primary); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); text-align: center;
        }

        .main-wrapper { flex: 1; padding: 20px; display: none; }
        .container { max-width: 1400px; margin: auto; background: var(--white); border-radius: 24px; box-shadow: var(--shadow); padding: 30px; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .kpi-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 20px; text-align: center; }
        .kpi-card .value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-container { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 20px; height: 320px; display: flex; flex-direction: column; align-items: center; }

        .filter-section { background: #f8fafc; padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .tabs-container { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .table-container { overflow-x: auto; border-radius: 16px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #64748b; font-size: 0.85rem; cursor: pointer; }
        th:hover { color: var(--primary); }
        
        .badge { padding: 5px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; display: inline-block; }
        .status-done { background: #dcfce7; color: #166534; }
        .status-progress { background: #fef3c7; color: #92400e; }
        .status-todo { background: #fee2e2; color: #991b1b; }

        .admin-controls { display: none; margin-bottom: 20px; padding: 20px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 16px; gap: 10px; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--success); color: white; }
        .btn-delete { background: #fee2e2; color: #b91c1c; padding: 5px 10px; font-size: 0.75rem; }
        
        .status-select { padding: 4px; border-radius: 8px; border: 1px solid #ddd; font-size: 0.8rem; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 30px; border-radius: 50px; display: none; z-index: 10000; }
    </style>
</head>
<body>

<div id="toast">تمت العملية بنجاح</div>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color: var(--primary)">🔐 بوابة الحوكمة</h2>
        <p>مبرة دار الخير - 2026</p>
        <input type="password" id="passCode" placeholder="كلمة المرور" onkeypress="if(event.key === 'Enter') login()">
        <button onclick="login()" class="btn" style="background: var(--primary); color: white; width: 100%; margin-top: 10px;">دخول للنظام</button>
        <p id="loginError" style="color: red; display: none; margin-top: 10px;">كلمة المرور غير صحيحة!</p>
    </div>
</div>

<div class="main-wrapper" id="mainApp">
    <div class="container">
        <header>
            <div>
                <h1 style="color: var(--primary); margin:0;">📊 لوحة تحكم الحوكمة التنفيذية</h1>
                <p id="userRoleLabel" style="font-weight:600; color: var(--secondary); margin-top:5px;"></p>
            </div>
            <button onclick="location.reload()" class="btn" style="background:#fee2e2; color:#b91c1c">تسجيل الخروج</button>
        </header>

        <div id="adminPanel" class="admin-controls">
            <div class="input-group">
                <label>وصف المهمة</label>
                <input type="text" id="taskName" placeholder="وصف المهمة">
            </div>
            <div class="input-group">
                <label>المسؤول</label>
                <input type="text" id="taskResp" placeholder="اسم المسؤول">
            </div>
            <div class="input-group">
                <label>الربع</label>
                <select id="taskQuarter">
                    <option>الربع الأول</option><option>الربع الثاني</option>
                    <option>الربع الثالث</option><option>الربع الرابع</option>
                </select>
            </div>
            <div class="input-group">
                <label>تاريخ الاستحقاق</label>
                <input type="date" id="taskDue">
            </div>
            <div style="display:flex; align-items:flex-end;">
                <button onclick="addNewTask()" class="btn btn-add">➕ إضافة مهمة</button>
            </div>
        </div>

        <div id="kpiArea" class="kpi-grid"></div>

        <div class="charts-grid">
            <div class="chart-container"><canvas id="chartDoughnut"></canvas></div>
            <div class="chart-container"><canvas id="chartBar"></canvas></div>
        </div>

        <div class="filter-section">
            <div class="tabs-container">
                <button class="tab-btn active" onclick="setMainFilter('all', this)">🏁 الكل</button>
                <button class="tab-btn" onclick="setMainFilter('quarter', this)">📅 الربع</button>
                <button class="tab-btn" onclick="setMainFilter('resp', this)">👥 المسؤول</button>
                <button class="tab-btn" onclick="setMainFilter('status', this)">✅ الحالة</button>
            </div>
            <div id="subTabs" style="display:flex; gap:5px; flex-wrap:wrap; margin-top:10px;"></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="35%">المهمة</th>
                        <th>المسؤول</th>
                        <th>الربع</th>
                        <th>الاستحقاق 📅</th>
                        <th>الحالة</th>
                        <th id="actionHeader" style="display:none">إجراء</th>
                    </tr>
                </thead>
                <tbody id="tasksBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://zvompylsleqkvtghpxna.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iBuK8TtoOHJ_G6bwiLDJTQ_NkyCBY7B';
    const PASSWORDS = { 'admin': '1234', 'observer': '0000' };
    
    let supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUserRole = null;
    let allTasks = [];
    let chart1 = null, chart2 = null;
    let mainFilter = 'all', subFilter = 'all';

    async function login() {
        const pass = document.getElementById('passCode').value;
        if (pass === PASSWORDS.admin) currentUserRole = 'admin';
        else if (pass === PASSWORDS.observer) currentUserRole = 'observer';
        else { document.getElementById('loginError').style.display = 'block'; return; }

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        
        if (currentUserRole === 'admin') {
            document.getElementById('adminPanel').style.display = 'flex';
            document.getElementById('actionHeader').style.display = 'table-cell';
            document.getElementById('userRoleLabel').innerText = 'المستخدم: مدير النظام (صلاحية كاملة)';
        } else {
            document.getElementById('userRoleLabel').innerText = 'المستخدم: مراقب عام (عرض فقط)';
        }
        await fetchData();
    }

    async function fetchData() {
        // جلب البيانات مع استثناء شعار النظام
        const { data } = await supabaseClient.from('governance_tasks').select('*').neq('resp', 'SYSTEM_LOGO');
        if (data) {
            // ترتيب المهام بحسب تاريخ الاستحقاق (الأقدم أولاً)
            // المهام التي ليس لها تاريخ توضع في الأخير
            allTasks = data.sort((a, b) => {
                if (!a.due) return 1;
                if (!b.due) return -1;
                return new Date(a.due) - new Date(b.due);
            });
            applyFilters();
            updateStats();
        }
    }

    async function addNewTask() {
        if (currentUserRole !== 'admin') return;
        const task = document.getElementById('taskName').value;
        const resp = document.getElementById('taskResp').value;
        const quarter = document.getElementById('taskQuarter').value;
        const due = document.getElementById('taskDue').value;

        if (!task || !resp) { showToast('يرجى ملء الحقول الأساسية'); return; }

        await supabaseClient.from('governance_tasks').insert([{ task, resp, quarter, due, status: 'لم تنفذ' }]);
        showToast('تمت إضافة المهمة بنجاح');
        document.getElementById('taskName').value = '';
        fetchData();
    }

    async function updateTaskStatus(id, newStatus) {
        if (currentUserRole !== 'admin') return;
        await supabaseClient.from('governance_tasks').update({ status: newStatus }).eq('id', id);
        showToast('تم تحديث الحالة');
        fetchData();
    }

    async function deleteTask(id) {
        if (currentUserRole !== 'admin' || !confirm('هل أنت متأكد من حذف هذه المهمة؟')) return;
        await supabaseClient.from('governance_tasks').delete().eq('id', id);
        fetchData();
    }

    function getStatusClass(status) {
        if (status === 'نفذت') return 'status-done';
        if (status === 'تحت الإجراء') return 'status-progress';
        return 'status-todo';
    }

    function renderTable(data) {
        const tbody = document.getElementById('tasksBody');
        tbody.innerHTML = data.map(t => `
            <tr>
                <td style="font-weight:600">${t.task}</td>
                <td>${t.resp}</td>
                <td><span style="font-size:0.8rem; background:#f1f5f9; padding:2px 6px; border-radius:4px">${t.quarter}</span></td>
                <td style="color: ${isOverdue(t.due, t.status) ? 'red' : 'inherit'}; font-weight: ${isOverdue(t.due, t.status) ? 'bold' : 'normal'}">
                    ${t.due || '-'} ${isOverdue(t.due, t.status) ? '⚠️' : ''}
                </td>
                <td>
                    ${currentUserRole === 'admin' ? `
                        <select class="status-select ${getStatusClass(t.status)}" onchange="updateTaskStatus(${t.id}, this.value)">
                            <option value="لم تنفذ" ${t.status === 'لم تنفذ' ? 'selected' : ''}>لم تنفذ</option>
                            <option value="تحت الإجراء" ${t.status === 'تحت الإجراء' ? 'selected' : ''}>تحت الإجراء</option>
                            <option value="نفذت" ${t.status === 'نفذت' ? 'selected' : ''}>نفذت</option>
                        </select>
                    ` : `
                        <span class="badge ${getStatusClass(t.status)}">${t.status}</span>
                    `}
                </td>
                ${currentUserRole === 'admin' ? `<td><button class="btn btn-delete" onclick="deleteTask(${t.id})">حذف</button></td>` : ''}
            </tr>
        `).join('');
    }

    function isOverdue(dueDate, status) {
        if (!dueDate || status === 'نفذت') return false;
        return new Date(dueDate) < new Date();
    }

    function setMainFilter(type, btn) {
        mainFilter = type;
        subFilter = 'all';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const sub = document.getElementById('subTabs');
        if (type === 'all') { sub.style.display = 'none'; applyFilters(); } 
        else {
            sub.style.display = 'flex';
            let options = type === 'quarter' ? ['الربع الأول', 'الربع الثاني', 'الربع الثالث', 'الربع الرابع'] :
                          type === 'status' ? ['نفذت', 'تحت الإجراء', 'لم تنفذ'] : [...new Set(allTasks.map(t => t.resp))];
            
            sub.innerHTML = `<button class="tab-btn active" style="padding:5px 10px; font-size:0.8rem" onclick="setSubFilter('all', this)">الكل</button>` + 
                            options.map(o => `<button class="tab-btn" style="padding:5px 10px; font-size:0.8rem" onclick="setSubFilter('${o}', this)">${o}</button>`).join('');
            applyFilters();
        }
    }

    function setSubFilter(val, btn) {
        subFilter = val;
        btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        let filtered = subFilter === 'all' ? allTasks : allTasks.filter(t => t[mainFilter] === subFilter);
        renderTable(filtered);
    }

    function updateStats() {
        const done = allTasks.filter(t => t.status === 'نفذت').length;
        const inProgress = allTasks.filter(t => t.status === 'تحت الإجراء').length;
        const total = allTasks.length;
        
        document.getElementById('kpiArea').innerHTML = `
            <div class="kpi-card"><h3>الإجمالي</h3><div class="value">${total}</div></div>
            <div class="kpi-card"><h3>منجزة</h3><div class="value" style="color:var(--success)">${done}</div></div>
            <div class="kpi-card"><h3>تحت الإجراء</h3><div class="value" style="color:var(--warning)">${inProgress}</div></div>
            <div class="kpi-card"><h3>الإنجاز</h3><div class="value">${total > 0 ? Math.round((done/total)*100) : 0}%</div></div>
        `;
        renderCharts(done, inProgress, total);
    }

    function renderCharts(done, inProgress, total) {
        const todo = total - done - inProgress;
        if (chart1) chart1.destroy();
        chart1 = new Chart(document.getElementById('chartDoughnut'), {
            type: 'doughnut',
            data: { 
                labels: ['منجز', 'تحت الإجراء', 'لم يبدأ'], 
                datasets: [{ 
                    data: [done, inProgress, todo], 
                    backgroundColor: ['#15803d', '#d97706', '#fee2e2'] 
                }] 
            },
            options: { maintainAspectRatio: false, plugins: { title: { display: true, text: 'تحليل حالات التنفيذ' } } }
        });

        if (chart2) chart2.destroy();
        chart2 = new Chart(document.getElementById('chartBar'), {
            type: 'bar',
            data: { 
                labels: ['Q1', 'Q2', 'Q3', 'Q4'], 
                datasets: [{ 
                    label: 'إجمالي المهام', 
                    data: ['الربع الأول', 'الربع الثاني', 'الربع الثالث', 'الربع الرابع'].map(q => allTasks.filter(t => t.quarter === q).length), 
                    backgroundColor: '#0e7e8f' 
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
</script>
</body>
</html>
