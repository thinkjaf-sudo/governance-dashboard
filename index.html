<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطة الحوكمة التنفيذية - مبرة دار الخير</title>
    <!-- استدعاء المكتبات من روابط موثوقة ومستقرة -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0a5e6f;
            --secondary: #0e7e8f;
            --success: #15803d;
            --warning: #b45309;
            --danger: #991b1b;
            --bg-light: #f1f5f9;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.2s ease; }

        body { background-color: var(--bg-light); margin: 0; padding: 0; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; }

        .main-wrapper { flex: 1; padding: 20px; }

        .container { max-width: 1440px; margin: auto; background: var(--white); border-radius: 24px; box-shadow: var(--shadow); padding: 30px; margin-bottom: 40px; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; flex-wrap: wrap; }

        .header-main { display: flex; align-items: center; gap: 20px; }

        .status-bar { font-size: 0.8rem; display: flex; align-items: center; gap: 5px; margin-top: 5px; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .online { background: #22c55e; }
        .offline { background: #ef4444; }

        /* Filter Section */
        .filter-section { background: #f8fafc; padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .tabs-container { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 16px; border-radius: 10px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-weight: 600; color: #475569; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .sub-tabs-container { display: flex; gap: 6px; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid #e2e8f0; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .sub-tab-btn { padding: 6px 12px; border-radius: 8px; border: none; background: #edf2f7; cursor: pointer; font-size: 0.8rem; }
        .sub-tab-btn.active { background: var(--secondary); color: white; }

        /* Tables & Charts */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-container { background: var(--white); border: 1px solid #e2e8f0; padding: 20px; border-radius: 20px; height: 300px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .kpi-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 20px; text-align: center; }
        .kpi-card .value { font-size: 1.8rem; font-weight: bold; color: var(--primary); }
        .table-container { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 16px; background: #fff; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #64748b; font-size: 0.85rem; font-weight: 700; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        
        .btn { padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; }
        
        footer { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 0.8rem; margin-top: auto; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <header>
            <div class="header-main">
                <div>
                    <h1 style="font-size: 1.5rem; color: var(--primary); margin:0;">⚙️ لوحة تحكم حوكمة مبرة دار الخير 2026</h1>
                    <div id="status" class="status-bar"><span class="status-dot offline"></span> جاري المحاولة للاتصال بالبيانات...</div>
                </div>
            </div>
            <button onclick="fetchData()" class="btn btn-primary">🔄 تحديث يدوي</button>
        </header>

        <div id="kpiArea" class="kpi-grid"></div>

        <div class="charts-grid">
            <div class="chart-container"><canvas id="mainChart"></canvas></div>
            <div class="chart-container"><canvas id="quarterChart"></canvas></div>
        </div>

        <div class="filter-section">
            <span style="font-weight:bold; color:var(--primary); font-size:0.9rem; display:block; margin-bottom:10px;">🔍 تصفية العرض:</span>
            <div class="tabs-container" id="mainTabs">
                <button class="tab-btn active" onclick="setMainFilter('all', this)">🏁 الكل</button>
                <button class="tab-btn" onclick="setMainFilter('quarter', this)">📅 الربع السنوي</button>
                <button class="tab-btn" onclick="setMainFilter('resp', this)">👤 المسؤول</button>
                <button class="tab-btn" onclick="setMainFilter('status', this)">✅ الحالة</button>
            </div>
            <div class="sub-tabs-container" id="subTabs" style="display:none;"></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>المهمة</th>
                        <th>المسؤول</th>
                        <th>الربع</th>
                        <th>الاستحقاق</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="tasksBody">
                    <tr><td colspan="5" style="text-align:center; padding:40px;">جاري تحميل البيانات من السحابة...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer>
    جميع الحقوق محفوظة © 2026 - مبرة دار الخير | نسخة العرض المباشر (GitHub)
</footer>

<script>
    // إعدادات الاتصال الثابتة
    const SUPABASE_URL = 'https://zvompylsleqkvtghpxna.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_iBuK8TtoOHJ_G6bwiLDJTQ_NkyCBY7B';
    let supabaseClient = null;
    let allTasks = [];
    let mainChart = null, quarterChart = null;
    let currentMainFilter = 'all';
    let currentSubFilter = 'all';

    async function init() {
        try {
            // التأكد من تحميل المكتبة قبل البدء
            if (typeof supabase === 'undefined') {
                console.error('Supabase library not loaded');
                document.getElementById('status').innerHTML = '<span class="status-dot offline"></span> فشل تحميل مكتبة البيانات';
                return;
            }
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            document.getElementById('status').innerHTML = '<span class="status-dot online"></span> متصل بالسحابة';
            await fetchData();
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerHTML = '<span class="status-dot offline"></span> خطأ في الاتصال';
        }
    }

    async function fetchData() {
        const { data, error } = await supabaseClient
            .from('governance_tasks')
            .select('*')
            .neq('resp', 'SYSTEM_LOGO')
            .order('id', { ascending: true });
        
        if (error) {
            console.error(error);
            return;
        }

        if (data) {
            allTasks = data;
            applyFilters();
            updateStats(data);
        }
    }

    function setMainFilter(type, btn) {
        currentMainFilter = type;
        currentSubFilter = 'all';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const subContainer = document.getElementById('subTabs');
        if (type === 'all') {
            subContainer.style.display = 'none';
        } else {
            subContainer.style.display = 'flex';
            generateSubTabs(type);
        }
        applyFilters();
    }

    function generateSubTabs(type) {
        const container = document.getElementById('subTabs');
        let options = [];
        if (type === 'quarter') options = ['الربع الأول', 'الربع الثاني', 'الربع الثالث', 'الربع الرابع'];
        else if (type === 'resp') options = [...new Set(allTasks.map(t => t.resp))];
        else if (type === 'status') options = ['نفذت', 'لم تنفذ'];

        container.innerHTML = `<button class="sub-tab-btn active" onclick="setSubFilter('all', this)">عرض الكل</button>` + 
            options.map(opt => `<button class="sub-tab-btn" onclick="setSubFilter('${opt}', this)">${opt}</button>`).join('');
    }

    function setSubFilter(val, btn) {
        currentSubFilter = val;
        document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        let tasks = allTasks;
        if (currentMainFilter !== 'all' && currentSubFilter !== 'all') {
            if (currentMainFilter === 'quarter') tasks = allTasks.filter(t => t.quarter === currentSubFilter);
            else if (currentMainFilter === 'resp') tasks = allTasks.filter(t => t.resp === currentSubFilter);
            else if (currentMainFilter === 'status') tasks = allTasks.filter(t => t.status === currentSubFilter);
        }
        renderTable(tasks);
    }

    function renderTable(tasks) {
        const tbody = document.getElementById("tasksBody");
        if (tasks.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px;">لا توجد مهام مطابقة للبحث</td></tr>`;
            return;
        }
        tbody.innerHTML = tasks.map(t => `
            <tr>
                <td style="font-weight:600">${t.task}</td>
                <td>${t.resp}</td>
                <td>${t.quarter}</td>
                <td>${t.due}</td>
                <td><span class="badge ${t.status === 'نفذت' ? 'badge-success' : 'badge-pending'}">${t.status}</span></td>
            </tr>
        `).join('');
    }

    function updateStats(data) {
        const total = data.length;
        const done = data.filter(t => t.status === 'نفذت').length;
        const perc = total ? Math.round((done/total)*100) : 0;

        document.getElementById("kpiArea").innerHTML = `
            <div class="kpi-card"><h3>إجمالي المهام</h3><div class="value">${total}</div></div>
            <div class="kpi-card"><h3>المنجزة</h3><div class="value" style="color:var(--success)">${done}</div></div>
            <div class="kpi-card"><h3>نسبة الإنجاز</h3><div class="value">${perc}%</div></div>
        `;

        if (mainChart) mainChart.destroy();
        mainChart = new Chart(document.getElementById('mainChart'), {
            type: 'doughnut',
            data: { labels: ['منجز', 'متبقي'], datasets: [{ data: [done, total-done], backgroundColor: ['#15803d', '#e2e8f0'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        if (quarterChart) quarterChart.destroy();
        quarterChart = new Chart(document.getElementById('quarterChart'), {
            type: 'bar',
            data: { 
                labels: ['Q1', 'Q2', 'Q3', 'Q4'], 
                datasets: [{ label: 'المهام', data: ['الربع الأول', 'الربع الثاني', 'الربع الثالث', 'الربع الرابع'].map(q => data.filter(t => t.quarter === q).length), backgroundColor: '#0e7e8f' }] 
            },
            options: { maintainAspectRatio: false }
        });
    }

    window.onload = init;
</script>

</body>
</html>
