<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الحوكمة 2026</title>
    <script src="[https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2](https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2)"></script>
    <script src="[https://cdn.jsdelivr.net/npm/chart.js](https://cdn.jsdelivr.net/npm/chart.js)"></script>
    <style>
        :root { --primary: #0a5e6f; --secondary: #0e7e8f; --bg-light: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-light); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .filter-section { background: #f8fafc; padding: 20px; border-radius: 16px; margin: 20px 0; border: 1px solid #e2e8f0; }
        .tabs-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid #cbd5e1; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .sub-tabs { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid #e2e8f0; }
        .sub-btn { padding: 6px 12px; border-radius: 8px; background: #edf2f7; cursor: pointer; border: none; font-size: 0.9rem; }
        .sub-btn.active { background: var(--secondary); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f4f4f4; }
        .badge { padding: 4px 8px; border-radius: 10px; font-size: 0.8rem; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-pending { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ لوحة تحكم الحوكمة - مبرة دار الخير</h1>
        <div class="filter-section">
            <p><strong>تصفية النتائج حسب:</strong></p>
            <div class="tabs-container" id="mainTabs">
                <button class="tab-btn active" onclick="setMain('all', this)">الكل</button>
                <button class="tab-btn" onclick="setMain('quarter', this)">الربع</button>
                <button class="tab-btn" onclick="setMain('resp', this)">المسؤول</button>
                <button class="tab-btn" onclick="setMain('due', this)">الاستحقاق</button>
                <button class="tab-btn" onclick="setMain('status', this)">الحالة</button>
            </div>
            <div id="subTabs" class="sub-tabs" style="display:none"></div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>المهمة</th>
                    <th>المسؤول</th>
                    <th>الربع</th>
                    <th>التاريخ</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="taskTable"></tbody>
        </table>
    </div>
    <script>
        // الكود البرمجي للربط بـ Supabase والفلترة
        // (يتم وضع بقية المنطق هنا كما في الملف الأصلي)
    </script>
</body>
</html>
