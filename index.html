<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحوكمة المطور - مبرة دار الخير</title>
    <!-- استدعاء المكتبات -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0a5e6f;
            --secondary: #0e7e8f;
            --success: #15803d;
            --bg-light: #f1f5f9;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.2s ease; }
        body { background-color: var(--bg-light); margin: 0; padding: 0; min-height: 100vh; }

        /* شاشة الدخول */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--primary); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); text-align: center;
        }

        .main-wrapper { flex: 1; padding: 20px; display: none; }
        .container { max-width: 1400px; margin: auto; background: var(--white); border-radius: 24px; box-shadow: var(--shadow); padding: 30px; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }

        /* الإحصائيات والرسوم */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .kpi-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 20px; text-align: center; }
        .kpi-card .value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-container { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 20px; height: 320px; display: flex; flex-direction: column; align-items: center; }

        /* نظام الفرز المطور */
        .filter-section { background: #f8fafc; padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .filter-label { font-weight: bold; color: var(--primary); margin-bottom: 10px; display: block; }
        
        .tabs-container { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .sub-tabs-container { display: flex; gap: 6px; flex-wrap: wrap; padding-top: 15px; border-top: 1px solid #e2e8f0; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        
        .sub-tab-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-size: 0.9rem; }
        .sub-tab-btn:hover { border-color: var(--secondary); color: var(--secondary); }
        .sub-tab-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }

        /* الجدول */
        .table-container { overflow-x: auto; border-radius: 16px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #64748b; font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background-color: #fcfdfe; }
        
        .badge { padding: 5px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-pending { background: #fef3c7; color: #92400e; }

        input[type="password"], input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; text-align: center; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color: var(--primary)">🔐 بوابة الحوكمة</h2>
        <p>مبرة دار الخير - 2026</p>
        <input type="password" id="passCode" placeholder="كلمة المرور" onkeypress="if(event.key === 'Enter') login()">
        <button onclick="login()" class="btn btn-primary">دخول للنظام</button>
        <p id="loginError" style="color: red; display: none; margin-top: 10px;">كلمة المرور غير صحيحة!</p>
    </div>
</div>

<div class="main-wrapper" id="mainApp">
    <div class="container">
        <header>
            <div>
                <h1 style="color: var(--primary); margin:0;">📊 لوحة تحكم الحوكمة التنفيذية</h1>
                <p id="userRoleLabel" style="font-weight:600; color: var(--secondary); margin-top:5px;"></p>
            </div>
            <button onclick="location.reload()" class="btn" style="background:#fee2e2; color:#b91c1c">تسجيل الخروج</button>
        </header>

        <div id="kpiArea" class="kpi-grid"></div>

        <div class="charts-grid">
            <div class="chart-container"><h3 style="font-size:0.9rem; color:#64748b">حالة الإنجاز الكلية</h3><canvas id="chartDoughnut"></canvas></div>
            <div class="chart-container"><h3 style="font-size:0.9rem; color:#64748b">توزيع المهام (الأرباع)</h3><canvas id="chartBar"></canvas></div>
        </div>

        <div class="filter-section">
            <span class="filter-label">🔍 تصفية وعرض المهام بحسب:</span>
            <div class="tabs-container">
                <button class="tab-btn active" onclick="setMainFilter('all', this)">🏁 عرض الكل</button>
                <button class="tab-btn" onclick="setMainFilter('quarter', this)">📅 الربع السنوي</button>
                <button class="tab-btn" onclick="setMainFilter('resp', this)">👥 المسؤول</button>
                <button class="tab-btn" onclick="setMainFilter('due', this)">⏳ الاستحقاق</button>
                <button class="tab-btn" onclick="setMainFilter('status', this)">✅ الحالة</button>
            </div>
            <div id="subTabs" class="sub-tabs-container" style="display:none"></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="40%">المهمة</th>
                        <th>المسؤول</th>
                        <th>الربع</th>
                        <th>تاريخ الاستحقاق</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="tasksBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const PASSWORDS = { 'admin': '1234', 'observer': '0000' };
    let currentUserRole = null;
    let allTasks = [];
    let chart1 = null, chart2 = null;
    let mainFilter = 'all', subFilter = 'all';

    async function login() {
        const pass = document.getElementById('passCode').value;
        if (pass === PASSWORDS.admin) currentUserRole = 'admin';
        else if (pass === PASSWORDS.observer) currentUserRole = 'observer';
        else {
            document.getElementById('loginError').style.display = 'block';
            return;
        }
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userRoleLabel').innerText = `المستخدم: ${currentUserRole === 'admin' ? 'مدير النظام' : 'مراقب عام'}`;
        await initData();
    }

    async function initData() {
        const client = supabase.createClient('https://zvompylsleqkvtghpxna.supabase.co', 'sb_publishable_iBuK8TtoOHJ_G6bwiLDJTQ_NkyCBY7B');
        const { data } = await client.from('governance_tasks').select('*').neq('resp', 'SYSTEM_LOGO').order('id');
        if (data) {
            allTasks = data;
            updateStats(data);
            renderTable(data);
        }
    }

    function setMainFilter(type, btn) {
        mainFilter = type;
        subFilter = 'all';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const sub = document.getElementById('subTabs');
        if (type === 'all') {
            sub.style.display = 'none';
            applyFilters();
        } else {
            sub.style.display = 'flex';
            let options = [];
            
            if (type === 'quarter') {
                options = ['الربع الأول', 'الربع الثاني', 'الربع الثالث', 'الربع الرابع'];
            } else if (type === 'status') {
                options = ['نفذت', 'لم تنفذ'];
            } else if (type === 'resp') {
                options = [...new Set(allTasks.map(t => t.resp))];
            } else if (type === 'due') {
                // تصفية بحسب السنة أو القريب (مثال بسيط)
                options = ['2026-01', '2026-02', '2026-03', '2026-04', '2026-05', '2026-06'];
            }

            sub.innerHTML = `<button class="sub-tab-btn active" onclick="setSubFilter('all', this)">عرض الكل</button>` + 
                            options.map(o => `<button class="sub-tab-btn" onclick="setSubFilter('${o}', this)">${o}</button>`).join('');
            applyFilters();
        }
    }

    function setSubFilter(val, btn) {
        subFilter = val;
        document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        let filtered = allTasks;
        if (subFilter !== 'all') {
            if (mainFilter === 'due') {
                filtered = allTasks.filter(t => t.due && t.due.startsWith(subFilter));
            } else {
                filtered = allTasks.filter(t => t[mainFilter] === subFilter);
            }
        }
        renderTable(filtered);
    }

    function renderTable(data) {
        document.getElementById('tasksBody').innerHTML = data.map(t => `
            <tr>
                <td style="font-weight:600; color:#1e293b">${t.task}</td>
                <td style="color:#64748b">${t.resp}</td>
                <td><span style="background:#f1f5f9; padding:3px 8px; border-radius:5px; font-size:0.8rem">${t.quarter}</span></td>
                <td dir="ltr" style="text-align:right; font-family:monospace">${t.due || '-'}</td>
                <td><span class="badge ${t.status === 'نفذت' ? 'badge-success' : 'badge-pending'}">${t.status}</span></td>
            </tr>
        `).join('');
    }

    function updateStats(data) {
        const done = data.filter(t => t.status === 'نفذت').length;
        const total = data.length;

        document.getElementById('kpiArea').innerHTML = `
            <div class="kpi-card"><h3>إجمالي المهام</h3><div class="value">${total}</div></div>
            <div class="kpi-card"><h3>المهام المنجزة</h3><div class="value" style="color:var(--success)">${done}</div></div>
            <div class="kpi-card"><h3>نسبة الإنجاز</h3><div class="value">${Math.round((done/total)*100)}%</div></div>
        `;

        if (chart1) chart1.destroy();
        chart1 = new Chart(document.getElementById('chartDoughnut'), {
            type: 'doughnut',
            data: { labels: ['منجز', 'متبقي'], datasets: [{ data: [done, total-done], backgroundColor: ['#15803d', '#f1f5f9'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        if (chart2) chart2.destroy();
        chart2 = new Chart(document.getElementById('chartBar'), {
            type: 'bar',
            data: { 
                labels: ['Q1', 'Q2', 'Q3', 'Q4'], 
                datasets: [{ label: 'عدد المهام', data: ['الربع الأول', 'الربع الثاني', 'الربع الثالث', 'الربع الرابع'].map(q => data.filter(t => t.quarter === q).length), backgroundColor: '#0e7e8f', borderRadius: 8 }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }
</script>
</body>
</html>
