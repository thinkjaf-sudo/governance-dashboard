<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطة الحوكمة التنفيذية - مبرة دار الخير</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0a5e6f; --secondary: #0e7e8f; --bg-light: #f1f5f9; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); margin: 0; padding: 0; }
        
        /* واجهة الدخول */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--primary); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 400px;
        }
        
        .main-wrapper { display: none; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 1.1rem; }
        .btn { padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); color: white; width: 100%; }
        
        /* الجداول والإحصائيات */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .kpi-card { background: #f8fafc; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-box { background: white; border: 1px solid #eee; padding: 15px; border-radius: 12px; height: 300px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: right; }
        th { background: #f4f4f4; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        .badge-success { background: #e6fffa; color: #2c7a7b; }
        .badge-pending { background: #fffaf0; color: #9c4221; }
        .admin-only { display: none; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color: var(--primary)">مرحباً بك</h2>
        <p>أدخل كلمة المرور للدخول</p>
        <input type="password" id="passInput" placeholder="كلمة المرور">
        <button class="btn" onclick="checkAuth()">دخول</button>
        <p id="errMsg" style="color:red; display:none; margin-top:10px">كلمة المرور غير صحيحة</p>
    </div>
</div>

<div class="main-wrapper" id="appBody">
    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h1>⚙️ لوحة تحكم الحوكمة 2026</h1>
            <button class="btn" style="width:auto; background:#eee; color:#333" onclick="location.reload()">خروج</button>
        </header>

        <div id="stats" class="kpi-grid"></div>

        <div class="charts-grid">
            <div class="chart-box"><canvas id="c1"></canvas></div>
            <div class="chart-box"><canvas id="c2"></canvas></div>
        </div>

        <div style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:20px">
            <strong>تصفية: </strong>
            <button onclick="filterTasks('all')">الكل</button> | 
            <button onclick="filterTasks('الربع الأول')">Q1</button>
            <button onclick="filterTasks('الربع الثاني')">Q2</button>
            <button onclick="filterTasks('الربع الثالث')">Q3</button>
            <button onclick="filterTasks('الربع الرابع')">Q4</button>
        </div>

        <div style="overflow-x:auto">
            <table>
                <thead><tr><th>المهمة</th><th>المسؤول</th><th>الربع</th><th>الحالة</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const KEY_ADMIN = "1234", KEY_OBS = "0000";
    let allData = [];

    async function checkAuth() {
        const val = document.getElementById('passInput').value;
        if (val === KEY_ADMIN || val === KEY_OBS) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appBody').style.display = 'block';
            await startApp();
        } else {
            document.getElementById('errMsg').style.display = 'block';
        }
    }

    async function startApp() {
        const client = supabase.createClient('https://zvompylsleqkvtghpxna.supabase.co', 'sb_publishable_iBuK8TtoOHJ_G6bwiLDJTQ_NkyCBY7B');
        const { data } = await client.from('governance_tasks').select('*').neq('resp', 'SYSTEM_LOGO');
        if (data) {
            allData = data;
            render(data);
        }
    }

    function render(tasks) {
        document.getElementById('tableBody').innerHTML = tasks.map(t => `
            <tr>
                <td>${t.task}</td>
                <td>${t.resp}</td>
                <td>${t.quarter}</td>
                <td><span class="badge ${t.status==='نفذت'?'badge-success':'badge-pending'}">${t.status}</span></td>
            </tr>
        `).join('');
        
        const done = allData.filter(x => x.status === 'نفذت').length;
        document.getElementById('stats').innerHTML = `
            <div class="kpi-card"><h3>الإنجاز</h3><p>${Math.round((done/allData.length)*100)}%</p></div>
            <div class="kpi-card"><h3>المهام</h3><p>${allData.length}</p></div>
        `;
    }

    function filterTasks(q) {
        render(q === 'all' ? allData : allData.filter(t => t.quarter === q));
    }
</script>
</body>
</html>
